<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Pergunta 2 ❤️</title>

    <link
        rel="stylesheet"
        href="../css/pergunta2.css"
    >

</head>

<body>

    <div class="container">

        <h1>Pergunta 2 ❤️</h1>

        <p class="pergunta">
            Você já tem planos para esse dia?
        </p>

        <div id="botoes">

            <button id="btnSim">
                SIM ❤️
            </button>

            <button id="btnNao">
                NÃO 😅
            </button>

        </div>

        <form
            id="formulario"
            class="hidden"
        >

            <h2>
                Então nós teremos um compromisso ❤️
            </h2>

            <label for="horario">
                Que horas nos encontraremos?
            </label>

            <select
                id="horario"
                required
            >

                <option value="">
                    Escolha um horário
                </option>

            </select>

            <label for="local">
                Em qual lugar nos encontraremos?
            </label>

            <input
                type="text"
                id="local"
                placeholder="Você decide..."
                required
            >

            <button type="submit">
                Confirmar ❤️
            </button>

        </form>

    </div>

    <script src="../js/pergunta2.js"></script>

</body>

</html>
